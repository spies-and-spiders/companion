name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  uberjar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Install clojure tools
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Cache clojure dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ hashFiles('deps.edn') }}
          restore-keys: cljdeps-

      - name: Install npm dependencies
        run: npm ci

      - name: Build uberjar
        run: make uber

      - name: Build SPI jar
        run: make spi-jar

      - name: Generate config schema
        run: make config-schema

      - name: Upload uberjar
        uses: actions/upload-artifact@v7
        with:
          name: uberjar
          path: target/companion-${{ github.ref_name }}-standalone.jar
          if-no-files-found: error

      - name: Upload SPI jar
        uses: actions/upload-artifact@v7
        with:
          name: spi-jar
          path: target/sns-spi-${{ github.ref_name }}.jar
          if-no-files-found: error

      - name: Upload config schema
        uses: actions/upload-artifact@v7
        with:
          name: config-schema
          path: config.schema.json
          if-no-files-found: error

  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-26.04
            os: linux
            arch: x64
          - runner: ubuntu-26.04-arm
            os: linux
            arch: arm64
          - runner: macos-26-intel
            os: macos
            arch: x64
          - runner: macos-26
            os: macos
            arch: arm64
          - runner: windows-latest
            os: windows
            arch: x64
            ext: '.exe'
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clojure tools
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install make (Windows)
        if: matrix.os == 'windows'
        run: choco install make --no-progress

      - name: Cache clojure dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ hashFiles('deps.edn') }}-${{ matrix.runner }}
          restore-keys: cljdeps-${{ matrix.runner }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build native image
        shell: bash
        run: make graalvm

      - name: Rename artifact
        id: rename
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          src="target/companion-${version}-standalone${{ matrix.ext }}"
          dest="companion-${version}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          cp "$src" "$dest"
          echo "artifact=$dest" >> "$GITHUB_OUTPUT"

      - name: Make artifact executable
        if: matrix.os != 'windows'
        shell: bash
        run: chmod 700 "${{ steps.rename.outputs.artifact }}"

      - name: Upload native image
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.rename.outputs.artifact }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - uberjar
      - native
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
