name: Bump version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 1.2.3, no leading v)'
        required: true
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # A PAT is required (not the default GITHUB_TOKEN) so that pushing the
          # tag triggers the tag-driven release workflow.
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.].+)?$ ]]; then
            echo "::error::'${{ inputs.version }}' is not a valid version (expected e.g. 1.2.3)"
            exit 1
          fi

      - name: Update version
        run: echo "${{ inputs.version }}" > VERSION

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Install clojure tools
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - name: Cache clojure dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: cljdeps-${{ hashFiles('deps.edn') }}
          restore-keys: cljdeps-

      - name: Run checks
        run: make check

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Release ${{ inputs.version }}"
          git tag "${{ inputs.version }}"
          git push origin HEAD
          git push origin "${{ inputs.version }}"
